<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMA ALPHA v1.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .phone { width: 320px; height: 580px; border: 8px solid #222; border-radius: 30px; position: relative; background: #050505; overflow: hidden; margin-top: 20px; box-shadow: 0 0 20px #0f03; }
        .screen { padding: 20px; height: 450px; display: none; }
        .active { display: block; }
        .card { background: #111; border: 1px solid #0f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; cursor: pointer; }
        .nav-item.on { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone">
    <div id="p1" class="screen active">
        <h2 style="color:white;">HUMA HOME</h2>
        <div class="card">
            <small>SIGNAL STRENGTH</small>
            <div style="font-size: 20px; color: #0f0;">█████ 100%</div>
            <small>RIG-888 CLUSTER: ONLINE</small>
        </div>
    </div>

    <div id="p2" class="screen">
        <h2 style="color:white;">WALLET</h2>
        <div class="card">
            <small>BALANCE</small>
            <div style="font-size: 20px; color: gold;">1,240.50 ATOM</div>
        </div>
        <input type="number" placeholder="12-DIGIT PIN" style="width:100%; padding:10px; background:#000; border:1px solid #444; color:#0f0;">
    </div>

    <div id="p3" class="screen">
        <h2 style="color:white;">LOGS</h2>
        <div class="card" style="font-size:11px;">
            <div>+234 810... <span style="float:right;">NG</span></div><br>
            <div>+1 202... <span style="float:right;">US</span></div><br>
            <div>+44 77... <span style="float:right;">UK</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item on" id="n1" onclick="go('p1','n1')">🏠 HOME</div>
        <div class="nav-item" id="n2" onclick="go('p2','n2')">💰 WALLET</div>
        <div class="nav-item" id="n3" onclick="go('p3','n3')">📞 CALLS</div>
    </div>
</div>

<script>
    function go(pageId, navId) {
        // Hide all
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
        // Show selected
        document.getElementById(pageId).classList.add('active');
        document.getElementById(navId).classList.add('on');
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #00ffff; font-family: monospace; text-align: center; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .hub { border: 2px solid #00ffff; padding: 30px; border-radius: 25px; width: 340px; background: #050505; box-shadow: 0 0 30px #00ffff33; }
        
        /* FACE RECOGNITION SCREEN */
        .face-frame { width: 120px; height: 120px; border: 2px dashed #00ffff; margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; transition: 0.5s; }
        .scan-bar { position: absolute; width: 100%; height: 3px; background: #00ffff; top: 0; left: 0; animation: fscan 2s infinite; box-shadow: 0 0 10px #00ffff; }
        @keyframes fscan { 0%, 100% { top: 0; } 50% { top: 100%; } }

        /* DASHBOARD SCREEN */
        #dash { display: none; text-align: left; animation: open 0.6s ease; }
        @keyframes open { from { opacity:0; scale:0.9; } to { opacity:1; scale:1; } }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 15px; margin-top: 15px; border-radius: 12px; border-left: 4px solid #00ffff; }
        .btn { width: 100%; padding: 15px; background: gold; color: #000; border: none; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="hub">
        <div id="gate">
            <h2 style="letter-spacing:3px;">FACE RECOGNITION</h2>
            <div class="face-frame" onclick="startScan()">
                👤 <div class="scan-bar" id="b" style="display:none;"></div>
            </div>
            <p id="msg">TAP TO SCAN FACE</p>
        </div>

        <div id="dash">
            <h2 style="color:#0f0; text-align:center; margin:0;">USER DASHBOARD</h2>
            <div class="card">
                <small>MINING ENGINE: 888 RIGS</small>
                <div style="font-size:30px; font-weight:bold; margin:10px 0;" id="c">0.000000</div>
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>HASHRATE: 4.5 TH/s</span> <span style="color:#0f0;">● ACTIVE</span>
                </div>
            </div>
            <div class="card" style="border-left-color: gold;">
                <small style="color:gold;">REFERENCE BONUS</small>
                <div style="font-size:20px; margin:5px 0;">0.5000 ATOM</div>
                <button class="btn" onclick="alert('0.5 ATOM Claimed to Huma-Pay!')">CLAIM REWARD</button>
            </div>
        </div>
    </div>

    <script>
        let coins = 0;
        function startScan() {
            document.getElementById('b').style.display='block';
            document.getElementById('msg').innerHTML='SCANNING FACE...';
            setTimeout(() => {
                document.getElementById('gate').style.display='none';
                document.getElementById('dash').style.display='block';
                setInterval(() => { coins += 0.000155; document.getElementById('c').innerHTML = coins.toFixed(6); }, 1000);
            }, 2500);
        }
    </script>
</body>
</html>
